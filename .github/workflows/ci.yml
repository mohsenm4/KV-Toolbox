name: Go CI

on:
  push:
    branches:
      - Create-pipeline
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install dependencies
        run: go mod tidy

      - name : install pckage fyne
        run: go get fyne.io/fyne/v2

      - name : install pckage fyne2
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name : set address in system
        run: export GOPATH=$HOME/go

      - name : set address in system2
        run: export PATH=$PATH:$GOPATH/bin

      - name : list
        run : ls

      - name : type system
        run : uname -a
        
      - name : go to cmd
        run : |
          cd cmd
          cd KV-Toolbox
          mkdir output
          fyne package -os darwin -icon icon.png -name ManageDB
          mv ManageDB.app output
          ls



        

