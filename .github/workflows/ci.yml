name: Go CI

on:
  release:
    types:
      - created  
      - edited    
      - deleted    
      - prereleased
permissions:
  contents: read 
  actions: write 
  packages: write
  issues: write       
  pull-requests: write 
      
jobs:
  address-files:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List root directory
        run: ls

      - name: List cmd directory
        run: |
          cd cmd
          ls

      - name: List KV-Toolbox directory
        run: |
          cd cmd/KV-Toolbox
          ls


  build-macos:

    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output

      - name: Build for macOS
        run: |
          cd cmd/KV-Toolbox
          fyne package -os darwin -icon icon.png -name ManageDB
          zip -r ManageDB.zip ManageDB.app
          mv ManageDB.zip output

      - name: List output directory
        run: ls cmd/KV-Toolbox/output

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-macos
          path: cmd/KV-Toolbox/output

  upload-release-asset:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download macOS Artifact
        uses: actions/download-artifact@v3
        with:
          name: output-macos
          path: output/macos

      - name: List all outputs
        run: |

          echo "macOS Output:"
          ls -lh output/macos

      - name : ls
        run : |
         ls 

      - name : ls
        run : |
          cd output
          ls

      - name: Upload macOS Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: output/macos/ManageDB.zip
          asset_name: ManageDB.zip
          asset_content_type: zip
