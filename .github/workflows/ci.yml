name: Go CI

on:
  push:
    branches:
      - Create-pipeline
  pull_request:
    branches:
      - main

jobs:
  address-files:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List root directory
        run: ls

      - name: List cmd directory
        run: |
          cd cmd
          ls

      - name: List KV-Toolbox directory
        run: |
          cd cmd/KV-Toolbox
          ls

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "C:\Users\runneradmin\go\bin" >> $env:GITHUB_PATH
          fyne version

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output

      - name: Build for Windows
        run: |
          cd cmd/KV-Toolbox
          fyne package -os windows -icon icon.png -name ManageDB
          mv ManageDB.exe output

      - name: List output directory
        run: dir cmd\KV-Toolbox\output

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-windows
          path: cmd/KV-Toolbox/output

  build-macos:
    needs: build-windows
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output

      - name: Build for macOS
        run: |
          cd cmd/KV-Toolbox
          fyne package -os darwin -icon icon.png -name ManageDB
          mv ManageDB.app output

      - name: List output directory
        run: ls cmd/KV-Toolbox/output

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-macos
          path: cmd/KV-Toolbox/output

  build-linux:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output

      - name: Build for Linux
        run: |
          cd cmd/KV-Toolbox
          fyne package -os linux -icon icon.png -name ManageDB
          mv ManageDB.tar.xz output

      - name: List output directory
        run: ls cmd/KV-Toolbox/output

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-linux
          path: cmd/KV-Toolbox/output

  create-report:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
          name: output-windows
          path: output/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v3
        with:
          name: output-macos
          path: output/macos

      - name: Download Linux Artifact
        uses: actions/download-artifact@v3
        with:
          name: output-linux
          path: output/linux

      - name: List all outputs
        run: |
          echo "Windows Output:"
          ls -lh output/windows
          echo ""
          echo "macOS Output:"
          ls -lh output/macos
          echo ""
          echo "Linux Output:"
          ls -lh output/linux
