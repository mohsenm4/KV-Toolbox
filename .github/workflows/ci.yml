name: Go CI

on:
  push:
    branches:
      - Create-pipeline
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev


      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output
      - name: list
        run: ls


      - name: Build for Linux
        run: |
          cd cmd/KV-Toolbox
          ls
          fyne package -os linux -icon icon.png -name ManageDB
          mv ManageDB.tar.xz output

      - name: Check file size
        run: |
          ls -lh output/ManageDB.tar.xz
          

      - name: List output directory
        run: ls output

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-linux
          path: output

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Fyne CLI
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "C:\Users\runneradmin\go\bin" >> $env:GITHUB_PATH
          fyne version

      - name: Create output directory
        run: mkdir output

      - name: Build for Windows
        run: |
          fyne package -os windows -icon icon.png -name ManageDB
          mv ManageDB.exe output

      - name: List output directory
        run: dir output

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-windows
          path: output

  build-macos:
    needs: build-windows
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p output

      - name: Build for macOS
        run: |
          fyne package -os darwin -icon icon.png -name ManageDB
          mv ManageDB.app output

      - name: List output directory
        run: ls output

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-macos
          path: output

  create-report:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v3
        with:
            name: output-linux
            path: output/linux
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
            name: output-windows
            path: output/windows
          
      - name: Download macOS Artifact
        uses: actions/download-artifact@v3
        with:
                  name: output-macos
                  path: output/macos
          
      - name: List all outputs
        run: |
                  echo "Linux Output:"
                  ls -lh output/linux
                  echo ""
                  echo "Windows Output:"
                  ls -lh output/windows
                  echo ""
                  echo "macOS Output:"
                  ls -lh output/macos
          
      - name: Log Linux Build Info
        run: |
          echo "Linux Build:"
          if [ -f output/linux/ManageDB.tar.xz ]; then
            ls -lh output/linux/ManageDB.tar.xz
            tar -tf output/linux/ManageDB.tar.xz
          else
            echo "Error: Linux build file not found!"
            exit 1
          fi

      - name: Log Windows Build Info
        run: |
          echo "Windows Build:"
          if [ -f output/windows/ManageDB.exe ]; then
            ls -lh output/windows/ManageDB.exe
          else
            echo "Error: Windows build file not found!"
            exit 1
          fi

      - name: Log macOS Build Info
        run: |
          echo "macOS Build:"
          if [ -d output/macos/ManageDB.app ]; then
            ls -lh output/macos/ManageDB.app
          else
            echo "Error: macOS build file not found!"
            exit 1
          fi

