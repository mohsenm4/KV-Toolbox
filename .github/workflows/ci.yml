name: Go CI

on:
  release:
    types:
      - created  
      - edited    
      - deleted    
      - prereleased

jobs:
  address-files:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: List root directory
        run: ls

      - name: List cmd directory
        run: |
          cd cmd
          ls

      - name: List KV-Toolbox directory
        run: |
          cd cmd/KV-Toolbox
          ls

  build-linux:
    
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Create output directory
        run: mkdir -p cmd/KV-Toolbox/output

      - name: Build for Linux
        run: |
          cd cmd/KV-Toolbox
          fyne package -os linux -icon icon.png -name ManageDB
          mv ManageDB.tar.xz output

      - name: List output directory
        run: ls cmd/KV-Toolbox/output

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v3
        with:
          name: output-linux
          path: cmd/KV-Toolbox/output

  upload-release-asset:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Linux Artifact
        uses: actions/download-artifact@v3
        with:
          name: output-linux
          path: output/linux

      - name: List all outputs
        run: |

          echo "Linux Output:"
          ls -lh output/linux

      - name : ls
        run : |
         ls

      - name: Upload Linux Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: output/linux/ManageDB.tar.xz
          asset_name: ManageDB.tar.xz
          asset_content_type: application/x-xz

